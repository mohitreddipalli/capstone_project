{% extends "base.html" %}

{% block title %}Verify OTP - AI Career Platform{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-2">Verify Your Email</h2>
                    <p class="text-center text-muted mb-4">
                        We've sent a 6-digit code to <strong>{{ email }}</strong>
                    </p>
                    
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-4">
                            <label for="otp" class="form-label">Enter 6-Digit Code</label>
                            <input type="text" 
                                   class="form-control form-control-lg text-center" 
                                   id="otp" 
                                   name="otp" 
                                   maxlength="6" 
                                   pattern="[0-9]{6}"
                                   placeholder="000000" 
                                   required 
                                   autofocus>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-check"></i> Verify & Continue
                        </button>
                    </form>

                    <p class="text-center">
                        Didn't receive the code? 
                        <a href="#" onclick="resendOTP()">Resend Code</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function resendOTP() {
    fetch('/auth/resend-otp', {
        method: 'POST',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.status) {
            alert('OTP resent successfully. Check your email.');
        } else {
            alert('Failed to resend OTP: ' + data.message);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('Failed to resend OTP');
    });
}
</script>
{% endblock %}
