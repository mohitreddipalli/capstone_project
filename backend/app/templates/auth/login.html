{% extends "base.html" %}

{% block title %}Login - AI Career Platform{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Welcome Back!</h2>
                    
                    {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endif %}

                    <form method="POST">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email or Username</label>
                            <input type="text" class="form-control" id="email" name="email" required autofocus>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                            <div class="text-end">
                                <a href="/auth/forgot-password" class="small">Forgot Password?</a>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="fas fa-sign-in-alt"></i> Sign In
                        </button>
                    </form>

                    <hr>

                    <div class="text-center mb-3">
                        <p class="text-muted">Or continue with:</p>
                        <button class="btn btn-outline-danger me-2" type="button">
                            <i class="fab fa-google"></i> Google
                        </button>
                        <button class="btn btn-outline-primary" type="button">
                            <i class="fab fa-linkedin"></i> LinkedIn
                        </button>
                    </div>

                    <hr>

                    <p class="text-center mb-0">
                        Don't have an account? <a href="/auth/register">Create One</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
