# Render deployment configuration
# Deploy to Render: https://dashboard.render.com

services:
  - type: web
    name: ai-career-platform
    runtime: python
    pythonVersion: 3.11
    startCommand: gunicorn backend.run_demo:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
    plan: free
    repo: https://github.com/YOUR_GITHUB_USERNAME/ai-career-platform.git

  # Optional: PostgreSQL database for future use
  # - type: pserv
  #   name: ai-career-db
  #   runtime: postgresql
  #   plan: free
